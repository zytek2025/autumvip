<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUTUM — Exclusive Mobility</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,300;0,400;1,300;1,400&family=Raleway:wght@100;200;300;400;500;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --K: #000000;
            --K1: #050505;
            --K2: #0a0a0a;
            --W: #ffffff;
            --G: #c9a84c;
            --G1: #e8c96a;
            --G2: #a8832a;
            --GL: rgba(201, 168, 76, 0.15);
            --FD: 'Playfair Display', serif;
            --FB: 'Raleway', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            background: var(--K);
            font-family: var(--FB);
            overflow: hidden;
            color: var(--W);
        }

        /* ── NOISE OVERLAY ── */
        .noise {
            position: fixed;
            inset: 0;
            z-index: 10;
            opacity: .03;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* ── AMBIENT BACKGROUND ── */
        .bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                radial-gradient(circle at 20% 30%, rgba(201, 168, 76, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(201, 168, 76, 0.05) 0%, transparent 40%),
                var(--K);
        }

        .orb {
            position: absolute;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(201, 168, 76, 0.03) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform-origin: center;
            animation: slowFloat 20s ease-in-out infinite alternate;
        }

        @keyframes slowFloat {
            0% {
                transform: translate(-30%, -20%) scale(1);
            }

            100% {
                transform: translate(-70%, -80%) scale(1.2);
            }
        }

        /* ── GEOMETRIC PATTERN ── */
        .geo-container {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1;
            opacity: 0.1;
            pointer-events: none;
        }

        .geo-svg {
            width: 120vh;
            height: 120vh;
            animation: rotateFull 120s linear infinite;
        }

        @keyframes rotateFull {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        /* ── CONTENT WRAPPER ── */
        .content {
            position: relative;
            z-index: 20;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        /* ── LOGO & WORDMARK ── */
        .logo-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            animation: fadeInUp 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .wordmark {
            display: flex;
            align-items: baseline;
            margin-bottom: 8px;
        }

        .letter {
            font-family: var(--FD);
            font-size: clamp(4rem, 15vw, 10rem);
            font-weight: 300;
            letter-spacing: 0.35em;
            line-height: 1;
            color: var(--W);
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.05);
        }

        .letter.gold {
            color: var(--G);
            font-style: italic;
            position: relative;
        }

        .letter.gold::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: 5%;
            width: 80%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--G1), transparent);
            filter: blur(1px);
            animation: pulseGlow 4s ease-in-out infinite;
        }

        @keyframes pulseGlow {

            0%,
            100% {
                opacity: 0.3;
                transform: scaleX(0.8);
            }

            50% {
                opacity: 1;
                transform: scaleX(1.1);
            }
        }

        .tagline {
            font-size: clamp(0.6rem, 1.5vw, 0.75rem);
            letter-spacing: 0.8em;
            text-transform: uppercase;
            color: rgba(201, 168, 76, 0.5);
            margin-right: -0.8em;
            font-weight: 300;
        }

        /* ── TEXT CONTENT ── */
        .text-section {
            margin-top: 60px;
            text-align: center;
            opacity: 0;
            animation: fadeInUp 1.5s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards;
            max-width: 500px;
        }

        .status {
            font-family: var(--FD);
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            font-weight: 300;
            line-height: 1.2;
            margin-bottom: 24px;
        }

        .status em {
            color: var(--G);
            font-style: italic;
        }

        .apology {
            font-size: 0.7rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.3);
            line-height: 1.8;
        }

        /* ── CONTACT ── */
        .contact-section {
            margin-top: 80px;
            opacity: 0;
            animation: fadeInUp 1.5s cubic-bezier(0.16, 1, 0.3, 1) 1s forwards;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .contact-label {
            font-size: 0.55rem;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            color: rgba(201, 168, 76, 0.4);
            margin-bottom: 24px;
        }

        .phone-display {
            font-family: var(--FD);
            font-size: clamp(1rem, 3vw, 1.5rem);
            font-weight: 300;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 0.15em;
            margin-bottom: 40px;
            position: relative;
        }

        .phone-display::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 30px;
            height: 1px;
            background: var(--G);
            opacity: 0.3;
        }

        /* ── BUTTONS ── */
        .actions {
            display: flex;
            gap: 20px;
        }

        .action-link {
            width: 54px;
            height: 54px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            color: var(--W);
            text-decoration: none;
            position: relative;
        }

        .action-link:hover {
            transform: translateY(-8px);
            border-color: var(--G);
            background: rgba(201, 168, 76, 0.08);
            box-shadow: 0 15px 35px rgba(201, 168, 76, 0.1);
        }

        .action-link svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: currentColor;
            stroke-width: 1.5;
            transition: transform 0.4s;
        }

        .action-link:hover svg {
            stroke: var(--G1);
            transform: scale(1.1);
        }

        .action-link.wa:hover {
            background: rgba(37, 211, 102, 0.05);
            border-color: #25D366;
        }

        .action-link.wa:hover svg {
            stroke: #25D366;
        }

        /* ── FOOTER MARK ── */
        .footer-mark {
            position: fixed;
            bottom: 30px;
            font-size: 0.5rem;
            letter-spacing: 0.6em;
            text-transform: uppercase;
            color: rgba(201, 168, 76, 0.15);
            pointer-events: none;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive Fixes */
        @media (max-width: 480px) {
            .actions {
                gap: 15px;
            }

            .tagline {
                letter-spacing: 0.4em;
            }
        }
    </style>
</head>

<body>
